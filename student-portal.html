<!DOCTYPE html>
<html>
<head>
<title>Student Enrollment</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

h1{
color:#9E1B32;
}

input,select,textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#9E1B32;
color:white;
border:none;
padding:12px;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>University Enrollment Application</h1>

<form>

<input type="text" placeholder="Roblox Username">

<input type="text" placeholder="Display Name">

<input type="number" placeholder="Age">

<select>
<option>Select Major</option>
<option>Business</option>
<option>Law</option>
<option>Medicine</option>
<option>Computer Science</option>
<option>Education</option>
</select>

<textarea placeholder="Why do you want to attend our university?"></textarea>

<button type="submit">Submit Application</button>

</form>

</div>

</body>
</html>
