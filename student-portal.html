<!DOCTYPE html>
<html>
<head>
<title>Student Portal Login</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#9E1B32;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Student Portal Login</h1>

<input
id="studentId"
type="text"
placeholder="Student ID">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

const studentId =
document.getElementById("studentId").value;

localStorage.setItem(
"studentId",
studentId
);

window.location.href =
"student-dashboard.html";

}

</script>

</body>
</html>
