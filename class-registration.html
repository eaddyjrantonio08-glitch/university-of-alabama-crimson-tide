<!DOCTYPE html>
<html>
<head>
<title>Class Registration</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

h1{
color:#9E1B32;
text-align:center;
}

.course{
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:5px;
}

button{
background:#9E1B32;
color:white;
border:none;
padding:12px;
width:100%;
margin-top:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Class Registration</h1>

<p>Select your courses for the semester:</p>

<div class="course">
<input type="checkbox"> English 101
</div>

<div class="course">
<input type="checkbox"> Math 101
</div>

<div class="course">
<input type="checkbox"> History 101
</div>

<div class="course">
<input type="checkbox"> Biology 101
</div>

<div class="course">
<input type="checkbox"> Criminal Justice 101
</div>

<div class="course">
<input type="checkbox"> Business Administration 101
</div>

<div class="course">
<input type="checkbox"> Sports Medicine 101
</div>

<button>Submit Registration</button>

</div>

</body>
</html>
